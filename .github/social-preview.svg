<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640"
     font-family="Symbols Nerd Font Mono, SF Mono, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#13141c"/>
    </linearGradient>
    <linearGradient id="bar-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2030"/>
      <stop offset="100%" stop-color="#232536"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Title -->
  <text x="640" y="80" text-anchor="middle" font-size="52" font-weight="700" fill="#c0caf5" letter-spacing="-1">claude-bar</text>

  <!-- Subtitle -->
  <text x="640" y="114" text-anchor="middle" font-size="18" fill="#565f89">A fast, configurable status line for Claude Code</text>

  <!-- ==================== MINIMAL PRESET (30% green) ==================== -->
  <!-- Elements: model, context, alert -->
  <g filter="url(#shadow)">
    <rect x="120" y="132" width="1040" height="74" rx="10" fill="#16161e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="120" y="132" width="1040" height="30" rx="10" fill="#1e1e2e"/>
    <rect x="120" y="152" width="1040" height="10" fill="#1e1e2e"/>
    <circle cx="148" cy="147" r="5.5" fill="#ff5f57"/>
    <circle cx="168" cy="147" r="5.5" fill="#febc2e"/>
    <circle cx="188" cy="147" r="5.5" fill="#28c840"/>
    <text x="640" y="152" text-anchor="middle" font-size="12" fill="#565f89">claude-bar --demo --preset minimal</text>
  </g>
  <rect x="140" y="174" width="1000" height="24" rx="4" fill="url(#bar-bg)" stroke="#2f3146" stroke-width="0.5"/>
  <g font-size="14">
    <text x="148" y="191" fill="#7aa2f7" filter="url(#glow)">&#xF4BE; Opus 4.6</text>
    <text x="247" y="191" fill="#9ece6a" font-size="15">&#xF4ED; ⣿⣿⣿</text>
    <text x="290" y="191" fill="#3b3d52" font-size="15">⠀⠀⠀⠀⠀⠀⠀</text>
    <text x="369" y="191" fill="#9ece6a">30%</text>
  </g>

  <!-- ==================== COMPACT PRESET (45% green) ==================== -->
  <!-- Elements: project, model, context, cost, alert -->
  <g filter="url(#shadow)">
    <rect x="120" y="218" width="1040" height="74" rx="10" fill="#16161e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="120" y="218" width="1040" height="30" rx="10" fill="#1e1e2e"/>
    <rect x="120" y="238" width="1040" height="10" fill="#1e1e2e"/>
    <circle cx="148" cy="233" r="5.5" fill="#ff5f57"/>
    <circle cx="168" cy="233" r="5.5" fill="#febc2e"/>
    <circle cx="188" cy="233" r="5.5" fill="#28c840"/>
    <text x="640" y="238" text-anchor="middle" font-size="12" fill="#565f89">claude-bar --demo --preset compact</text>
  </g>
  <rect x="140" y="260" width="1000" height="24" rx="4" fill="url(#bar-bg)" stroke="#2f3146" stroke-width="0.5"/>
  <g font-size="14">
    <text x="148" y="277" fill="#7aa2f7">&#xF46D; …/my-project</text>
    <text x="289" y="277" fill="#7aa2f7" filter="url(#glow)">&#xF4BE; Opus 4.6</text>
    <text x="388" y="277" fill="#9ece6a" font-size="15">&#xF4ED; ⣿⣿⣿⣿⡀</text>
    <text x="449" y="277" fill="#3b3d52" font-size="15">⠀⠀⠀⠀⠀</text>
    <text x="510" y="277" fill="#9ece6a">45%</text>
    <text x="551" y="277" fill="#565f89">&#xF439; $5.24</text>
  </g>

  <!-- ==================== DEFAULT PRESET (62% yellow) ==================== -->
  <!-- Elements: project, model, style(hidden), git_branch, context, cost, duration, alert -->
  <g filter="url(#shadow)">
    <rect x="120" y="304" width="1040" height="74" rx="10" fill="#16161e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="120" y="304" width="1040" height="30" rx="10" fill="#1e1e2e"/>
    <rect x="120" y="324" width="1040" height="10" fill="#1e1e2e"/>
    <circle cx="148" cy="319" r="5.5" fill="#ff5f57"/>
    <circle cx="168" cy="319" r="5.5" fill="#febc2e"/>
    <circle cx="188" cy="319" r="5.5" fill="#28c840"/>
    <text x="640" y="324" text-anchor="middle" font-size="12" fill="#565f89">claude-bar --demo --preset default</text>
  </g>
  <rect x="140" y="346" width="1000" height="24" rx="4" fill="url(#bar-bg)" stroke="#2f3146" stroke-width="0.5"/>
  <g font-size="14">
    <text x="148" y="363" fill="#7aa2f7">&#xF46D; …/my-project</text>
    <text x="289" y="363" fill="#7aa2f7" filter="url(#glow)">&#xF4BE; Opus 4.6</text>
    <text x="388" y="363" fill="#bb9af7">&#xF418; main</text>
    <text x="454" y="363" fill="#e0af68" font-size="15">&#xF4ED; ⣿⣿⣿⣿⣿⣿⡄</text>
    <text x="533" y="363" fill="#3b3d52" font-size="15">⠀⠀⠀</text>
    <text x="560" y="363" fill="#e0af68">62%</text>
    <text x="601" y="363" fill="#565f89">&#xF439; $5.24</text>
    <text x="675" y="363" fill="#565f89">&#xF4E3; 10m</text>
  </g>

  <!-- ==================== FULL PRESET (4 lines) ==================== -->
  <!-- Line 1: project, model, version, style(hidden), git_branch, cwd, daily_budget -->
  <!-- Line 2: context, ctx_trend, cost, wall_time, spend_rate, duration, burn_rate -->
  <!-- Line 3: lines, tokens, session_tok_per_dollar, cache, cache_hit_rate -->
  <!-- Line 4: project_today_cost, cost_vs_avg, avg_daily_cost -->
  <g filter="url(#shadow)">
    <rect x="120" y="390" width="1040" height="158" rx="10" fill="#16161e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="120" y="390" width="1040" height="30" rx="10" fill="#1e1e2e"/>
    <rect x="120" y="410" width="1040" height="10" fill="#1e1e2e"/>
    <circle cx="148" cy="405" r="5.5" fill="#ff5f57"/>
    <circle cx="168" cy="405" r="5.5" fill="#febc2e"/>
    <circle cx="188" cy="405" r="5.5" fill="#28c840"/>
    <text x="640" y="410" text-anchor="middle" font-size="12" fill="#565f89">claude-bar --demo --preset full</text>
  </g>
  <!-- Line 1 bar -->
  <rect x="140" y="432" width="1000" height="108" rx="4" fill="url(#bar-bg)" stroke="#2f3146" stroke-width="0.5"/>
  <g font-size="14">
    <text x="148" y="449" fill="#7aa2f7">&#xF46D; …/my-project</text>
    <text x="289" y="449" fill="#7aa2f7" filter="url(#glow)">&#xF4BE; Opus 4.6</text>
    <text x="388" y="449" fill="#565f89">&#xF412; v2.1.63</text>
    <text x="479" y="449" fill="#bb9af7">&#xF418; main</text>
    <text x="545" y="449" fill="#565f89">&#xF489; …/my-project</text>
    <text x="686" y="449" fill="#565f89">&#xF439; $52/$100</text>
    <text x="786" y="449" fill="#e0af68">▰▰▰▰</text>
    <text x="822" y="449" fill="#3b3d52">▱▱▱▱</text>
    <text x="858" y="449" fill="#e0af68">52%</text>
  </g>
  <!-- Line 2 bar -->
  <g font-size="14">
    <text x="148" y="477" fill="#9ece6a" font-size="15">&#xF4ED; ⣿⣿⣿</text>
    <text x="191" y="477" fill="#3b3d52" font-size="15">⠀⠀⠀⠀⠀⠀⠀</text>
    <text x="270" y="477" fill="#9ece6a">30%</text>
    <text x="311" y="477" fill="#9ece6a">&#xF4ED; ▲ +3%</text>
    <text x="394" y="477" fill="#565f89">&#xF439; $4.11</text>
    <text x="468" y="477" fill="#565f89">&#xF4E3; 1h54m</text>
    <text x="548" y="477" fill="#565f89">&#xF439; $2.15/hr</text>
    <text x="650" y="477" fill="#565f89">&#xF4E3; 16m</text>
    <text x="716" y="477" fill="#565f89">&#xF490; $14.52/hr</text>
  </g>
  <!-- Line 3 bar -->
  <g font-size="14">
    <text x="148" y="505" fill="#9ece6a">&#xF4D2; +438</text>
    <text x="204" y="505" fill="#565f89">/</text>
    <text x="212" y="505" fill="#f7768e">-265</text>
    <text x="256" y="505" fill="#565f89">&#xF4DF; 3.9k/28.6k</text>
    <text x="370" y="505" fill="#565f89">&#xF4DF; 6.9k/$</text>
    <text x="450" y="505" fill="#565f89">&#xF49B; r:59.0k w:1.5k</text>
    <text x="600" y="505" fill="#565f89">&#xF49B; 98%</text>
  </g>
  <!-- Line 4 bar -->
  <g font-size="14">
    <text x="148" y="533" fill="#7aa2f7">&#xF439; $0.00 today</text>
    <text x="280" y="533" fill="#565f89">&#xF4A8; 0.0× avg</text>
    <text x="388" y="533" fill="#565f89">&#xF439; $0.00/day</text>
  </g>

  <!-- Rust badge -->
  <rect x="553" y="560" width="174" height="30" rx="15" fill="#1a1b26" stroke="#2f3146" stroke-width="1"/>
  <text x="640" y="580" text-anchor="middle" font-size="13" fill="#f7768e">written in Rust 🦀</text>

  <!-- Performance badge -->
  <text x="640" y="616" text-anchor="middle" font-size="14" fill="#3b3d52">~3ms startup · Nerd Font icons · ANSI colors</text>
</svg>
